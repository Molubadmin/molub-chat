<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Molub Assistant</title>

<style>
body {
  margin: 0;
  background: transparent;
  overflow: hidden;
}

/* CONTENEDOR GLOBAL (NO BLOQUEA CLICS) */
#container {
  position: fixed;
  inset: 0;
  pointer-events: none; /* 🔥 CLAVE */
  z-index: 999999;
}

/* BURBUJA */
#bubble {
  position: absolute;
  bottom: 24px;
  right: 24px;
  width: 68px;
  height: 68px;
  cursor: pointer;
  pointer-events: auto; /* 🔥 CLAVE */
}

.ring {
  position: absolute;
  width: 68px;
  height: 68px;
  border-radius: 50%;
  background: rgba(0,0,250,0.25);
  animation: pulse 2s infinite;
}

.ring:nth-child(2){ animation-delay: .7s; }

@keyframes pulse {
  0% { transform: scale(1); opacity:.7;}
  100% { transform: scale(2.2); opacity:0;}
}

.inner {
  position: relative;
  width: 68px;
  height: 68px;
  background:#0000FA;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  border:3px solid white;
  z-index:2;
}

svg {
  width:34px;
  height:34px;
  stroke:white;
  animation:spin 5s linear infinite;
}

@keyframes spin {
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}

/* CHAT */
#chat {
  position: absolute;
  bottom: 100px;
  right: 24px;
  width: 400px;
  height: 650px;
  background:#fff;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,.3);
  display:none;
  flex-direction:column;
  pointer-events: auto; /* 🔥 CLAVE */
}

#header {
  height:50px;
  background:#0000FA;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 12px;
  color:#fff;
  font-weight:bold;
}

#close {
  cursor:pointer;
  font-size:22px;
}

iframe {
  border:none;
  width:100%;
  height:100%;
}
</style>
</head>

<body>

<div id="container">

  <div id="chat">
    <div id="header">
      Asistente MOLUB
      <div id="close">×</div>
    </div>

    <iframe src="https://www.chatbase.co/chatbot-iframe/T6WiqlbmwoYphNUJwDI4P"></iframe>
  </div>

  <div id="bubble">
    <div class="ring"></div>
    <div class="ring"></div>

    <div class="inner">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82"/>
      </svg>
    </div>
  </div>

</div>

<script>
const bubble = document.getElementById("bubble");
const chat = document.getElementById("chat");
const closeBtn = document.getElementById("close");

bubble.onclick = () => {
  chat.style.display = "flex";
};

closeBtn.onclick = (e) => {
  e.stopPropagation();
  chat.style.display = "none";
};
</script>

</body>
</html>
