<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MOLUB Lubrication Advisor</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: transparent;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    #molub-widget-root {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    #molub-chat-wrapper {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999999;
      pointer-events: auto;
    }

    #molub-chat-bubble {
      position: relative;
      width: 68px;
      height: 68px;
      cursor: pointer;
    }

    .molub-pulse-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: rgba(0, 0, 250, 0.22);
      animation: molubPulse 2.2s ease-out infinite;
    }

    .molub-pulse-ring:nth-child(2) {
      animation-delay: 0.8s;
    }

    @keyframes molubPulse {
      0% {
        transform: scale(1);
        opacity: 0.65;
      }
      100% {
        transform: scale(2.2);
        opacity: 0;
      }
    }

    .molub-bubble-inner {
      position: relative;
      z-index: 2;
      width: 68px;
      height: 68px;
      border-radius: 50%;
      background: #0000FA;
      border: 3px solid #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      box-sizing: border-box;
    }

    #molub-chat-bubble:hover .molub-bubble-inner {
      transform: scale(1.08);
      box-shadow: 0 16px 35px rgba(0, 0, 0, 0.35);
    }

    .molub-gear-icon {
      width: 34px;
      height: 34px;
      animation: molubSpin 5s linear infinite;
    }

    @keyframes molubSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #molub-chat-popup {
      position: absolute;
      right: 0;
      bottom: 88px;
      width: 400px;
      max-width: calc(100vw - 32px);
      height: 680px;
      background: #ffffff;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.28);
      border: 1px solid #d9d9d9;
      opacity: 0;
      visibility: hidden;
      transform: translateY(16px) scale(0.98);
      transition: opacity 0.25s ease, transform 0.25s ease, visibility 0.25s ease;
    }

    #molub-chat-popup.active {
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
    }

    #molub-chat-header {
      height: 56px;
      background: #0000FA;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-sizing: border-box;
    }

    #molub-chat-header-title {
      color: #ffffff;
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 0.2px;
    }

    #molub-chat-close {
      width: 34px;
      height: 34px;
      border: none;
      background: rgba(255,255,255,0.14);
      color: #ffffff;
      font-size: 22px;
      line-height: 1;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #molub-chat-frame {
      width: 100%;
      height: calc(100% - 56px);
      border: none;
      display: block;
      background: #ffffff;
    }

    @media (max-width: 768px) {
      #molub-chat-wrapper {
        right: 16px;
        bottom: 16px;
      }

      #molub-chat-popup {
        width: 92vw;
        height: 74vh;
        bottom: 84px;
      }

      #molub-chat-bubble,
      .molub-bubble-inner {
        width: 62px;
        height: 62px;
      }

      .molub-gear-icon {
        width: 30px;
        height: 30px;
      }
    }
  </style>
</head>
<body>
  <div id="molub-widget-root">
    <div id="molub-chat-wrapper">
      <div id="molub-chat-popup">
        <div id="molub-chat-header">
          <div id="molub-chat-header-title">MOLUB Lubrication Advisor</div>
          <button id="molub-chat-close" type="button" aria-label="Cerrar chat">&times;</button>
        </div>

        <iframe
          id="molub-chat-frame"
          src="https://www.chatbase.co/chatbot-iframe/T6WiqlbmwoYphNUJwDI4P"
          allow="microphone; clipboard-write"
          frameborder="0">
        </iframe>
      </div>

      <div id="molub-chat-bubble" title="Abrir asistente">
        <div class="molub-pulse-ring"></div>
        <div class="molub-pulse-ring"></div>

        <div class="molub-bubble-inner">
          <svg class="molub-gear-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"
                  stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                     1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33
                     l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1
                     0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65
                     1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65
                     0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51
                     1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"
                  stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function () {
      var bubble = document.getElementById("molub-chat-bubble");
      var popup = document.getElementById("molub-chat-popup");
      var closeBtn = document.getElementById("molub-chat-close");
      var wrapper = document.getElementById("molub-chat-wrapper");

      bubble.addEventListener("click", function (e) {
        e.stopPropagation();
        popup.classList.toggle("active");
      });

      closeBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        popup.classList.remove("active");
      });

      document.addEventListener("click", function (e) {
        if (!wrapper.contains(e.target)) {
          popup.classList.remove("active");
        }
      });
    })();
  </script>
</body>
</html>
